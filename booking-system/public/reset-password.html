<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset password — Soki Social Sauna</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/booking.css">
</head>
<body>
<nav class="nav" id="nav">
  <div class="container nav__inner">
    <a href="/" class="nav__logo">
      <span class="nav__logo-name">Soki</span>
      <span class="nav__logo-tagline">sauna van de stad</span>
    </a>
  </div>
</nav>

<div class="section" style="min-height:100vh;display:flex;align-items:center;">
  <div class="container" style="max-width:440px;margin:0 auto;padding:var(--nav-height) 1.5rem 4rem;">

    <div id="reset-form-wrap">
      <span class="eyebrow">Account</span>
      <h2 style="margin:0.5rem 0 1rem">Set new password</h2>
      <p style="color:var(--text-muted);margin-bottom:2rem">Enter your new password below.</p>
      <form id="reset-form">
        <div class="form-group">
          <label class="form-label">New password</label>
          <input class="form-input" type="password" id="reset-password" placeholder="At least 8 characters" minlength="8" required>
        </div>
        <div class="form-group">
          <label class="form-label">Confirm password</label>
          <input class="form-input" type="password" id="reset-password-confirm" placeholder="Repeat password" required>
        </div>
        <p id="reset-error" style="color:#C0392B;font-size:13px;margin-bottom:1rem;min-height:18px"></p>
        <button class="btn btn--primary" type="submit" style="width:100%">Set new password</button>
      </form>
    </div>

    <div id="reset-success" style="display:none;text-align:center">
      <div style="font-size:3rem;margin-bottom:1rem">🔥</div>
      <h2 style="margin-bottom:0.5rem">Password updated</h2>
      <p style="color:var(--text-muted);margin-bottom:2rem">You can now log in with your new password.</p>
      <a href="/booking" class="btn btn--primary">Go to booking</a>
    </div>

    <div id="reset-invalid" style="display:none;text-align:center">
      <h2 style="margin-bottom:0.5rem">Link expired</h2>
      <p style="color:var(--text-muted);margin-bottom:2rem">This reset link is invalid or has expired. Request a new one.</p>
      <a href="/booking" class="btn btn--primary">Back to login</a>
    </div>

  </div>
</div>

<script>
(function () {
  const token = new URLSearchParams(location.search).get('token');
  if (!token) {
    document.getElementById('reset-form-wrap').style.display = 'none';
    document.getElementById('reset-invalid').style.display = 'block';
    return;
  }

  document.getElementById('reset-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const errEl = document.getElementById('reset-error');
    const pw    = document.getElementById('reset-password').value;
    const pw2   = document.getElementById('reset-password-confirm').value;
    errEl.textContent = '';
    if (pw !== pw2) { errEl.textContent = 'Passwords do not match'; return; }

    const btn = e.target.querySelector('button[type=submit]');
    btn.disabled = true;
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password: pw }),
    }).then(r => r.json());
    btn.disabled = false;

    if (res.error) {
      if (res.error.includes('Invalid or expired')) {
        document.getElementById('reset-form-wrap').style.display = 'none';
        document.getElementById('reset-invalid').style.display = 'block';
      } else {
        errEl.textContent = res.error;
      }
      return;
    }

    document.getElementById('reset-form-wrap').style.display = 'none';
    document.getElementById('reset-success').style.display = 'block';
  });
})();
</script>

<script src="/translations.js"></script>
<script src="/main.js"></script>
</body>
</html>
