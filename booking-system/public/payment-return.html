<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Betaling – Soki Social Sauna</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --terra: #D94D1A; --brown: #4A1C0C; --muted: #7A5A4A; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--brown);
      padding: 24px 16px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 36px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,.25);
    }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 {
      font-family: 'Barlow Condensed', Arial, sans-serif;
      font-size: 32px;
      font-weight: 800;
      text-transform: uppercase;
      color: var(--brown);
      margin-bottom: 10px;
    }
    p { color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: inline-block;
      padding: 13px 32px;
      border-radius: 100px;
      background: var(--terra);
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      text-decoration: none;
      transition: opacity .2s;
    }
    .btn:hover { opacity: .88; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #E8D5BF;
      border-top-color: var(--terra);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner"></div>
  <p data-i18n="payment.processing">Processing payment…</p>
</div>

<script src="/translations.js"></script>
<script src="https://js.stripe.com/v3/"></script>
<script>
  function t(key) {
    var lang = (typeof SOKI_LANG !== 'undefined') ? SOKI_LANG : (localStorage.getItem('soki_lang') || 'nl');
    var dict = (typeof SOKI_I18N !== 'undefined') ? (SOKI_I18N[lang] || SOKI_I18N['en']) : {};
    return (dict[key] !== undefined) ? dict[key] : key;
  }
</script>
<script>
  var params   = new URLSearchParams(location.search);
  var intentId = params.get('payment_intent');
  var secret   = params.get('payment_intent_client_secret');
  var token    = localStorage.getItem('soki_token');
  var attempts = 0;
  var maxAttempts = 3;

  function show(icon, title, msg, link, linkText, extraHtml) {
    document.getElementById('card').innerHTML =
      '<div class="icon">' + icon + '</div>' +
      '<h1>' + title + '</h1>' +
      '<p>' + msg + '</p>' +
      (extraHtml || '') +
      '<a class="btn" href="' + link + '">' + linkText + '</a>';
  }

  function showBookingSummary(conf) {
    var summaryHtml = '';
    if (conf.session_name || conf.date || conf.id) {
      summaryHtml = '<div style="background:#F1F8F1;border-radius:12px;padding:16px 20px;margin-bottom:24px;text-align:left;">' +
        (conf.session_name ? '<div style="font-weight:700;color:#2E7D32;margin-bottom:4px;">&#10003; <strong>' + conf.session_name + '</strong></div>' : '') +
        (conf.date ? '<div style="font-size:14px;color:var(--brown);">' + conf.date + (conf.start_time ? ' &middot; ' + conf.start_time + (conf.end_time ? '–' + conf.end_time : '') : '') + '</div>' : '') +
        (conf.id ? '<div style="font-size:13px;color:var(--muted);margin-top:4px;">Booking #' + conf.id + '</div>' : '') +
      '</div>';
    }
    return summaryHtml;
  }

  function confirmPayment() {
    attempts++;
    var controller = new AbortController();
    var timeoutId = setTimeout(function() { controller.abort(); }, 10000);

    fetch('/api/payments/confirm', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token,
      },
      body: JSON.stringify({ payment_intent_id: intentId }),
      signal: controller.signal,
    })
    .then(function(r) {
      clearTimeout(timeoutId);
      if (!r.ok) throw new Error('http-' + r.status);
      return r.json();
    })
    .then(function(conf) {
      if (conf.confirmed) {
        var summary = showBookingSummary(conf);
        if (!conf.session_name && conf.booking_id) {
          // Fetch booking details if not included in confirm response
          fetch('/api/bookings/' + conf.booking_id, {
            headers: { 'Authorization': 'Bearer ' + token },
          }).then(function(r) { return r.json(); }).then(function(b) {
            if (b && b.session_name) {
              summary = showBookingSummary(b);
            }
            show('✅', t('payment.confirmed.title'), t('payment.confirmed.msg'),
              '/account', t('payment.confirmed.btn'), summary);
          }).catch(function() {
            show('✅', t('payment.confirmed.title'), t('payment.confirmed.msg'),
              '/account', t('payment.confirmed.btn'), summary);
          });
        } else {
          show('✅', t('payment.confirmed.title'), t('payment.confirmed.msg'),
            '/account', t('payment.confirmed.btn'), summary);
        }
      } else {
        show('❌', t('payment.failed.title'), t('payment.failed.msg'),
          '/booking', t('payment.failed.btn'));
      }
    })
    .catch(function(err) {
      clearTimeout(timeoutId);
      if (err.name === 'AbortError') {
        show('⏳', t('payment.timeout.title'), t('payment.timeout.msg'),
          '/account', t('payment.confirmed.btn'));
        return;
      }
      if (attempts < maxAttempts) {
        document.getElementById('card').innerHTML =
          '<div class="icon">⚠️</div>' +
          '<h1>' + t('payment.retry.title') + '</h1>' +
          '<p>' + t('payment.retry.msg') + '</p>' +
          '<button class="btn" onclick="confirmPayment()" style="cursor:pointer;border:none;">' + t('payment.retry.btn') + '</button>';
      } else {
        show('❌', t('payment.error.title'), t('payment.error.msg'),
          '/', t('payment.error.btn'));
      }
    });
  }

  if (!intentId || !secret || !token) {
    show('⚠️', t('payment.expired.title'), t('payment.expired.msg'), '/login', t('payment.expired.btn'));
  } else {
    confirmPayment();
  }
</script>
</body>
</html>
